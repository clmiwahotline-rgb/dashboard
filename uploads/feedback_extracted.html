<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"><title>フィードバック報告ダッシュボード</title><style>html,body{margin:0;padding:0;width:100%;overflow-x:hidden;}:root{--bg:#0c0e12;--surface:#13161d;--card:#1a1e28;--border:#252a3a;--accent:#4f8ef7;--green:#34d399;--yellow:#fbbf24;--red:#f87171;--text:#e2e8f5;--muted:#5a6380;--muted2:#8892aa;}*{box-sizing:border-box;}body{background:var(--bg);color:var(--text);font-family:sans-serif;min-height:100vh;}.app{display:flex;flex-direction:column;min-height:100vh;}.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;position:sticky;top:0;z-index:40;}.topbar h1{font-size:30px;margin:0 0 2px;}.topbar-sub{font-size:22px;color:var(--muted2);}.btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);font-size:24px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted2);}.main{padding:16px;flex:1;}.loading{text-align:center;padding:60px 20px;font-size:14px;}.loading-icon{font-size:36px;animation:spin 2s linear infinite;display:block;margin-bottom:12px;}@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}@media(min-width:640px){.kpi-row{grid-template-columns:repeat(4,1fr);}}.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;}.kpi-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0;}.kpi-card.blue::before{background:var(--accent);}.kpi-card.green::before{background:var(--green);}.kpi-card.yellow::before{background:var(--yellow);}.kpi-card.red::before{background:var(--red);}.kpi-label{font-size:20px;color:var(--muted2);margin-bottom:6px;}.kpi-value{font-size:52px;font-weight:900;margin-bottom:2px;}.kpi-card.blue .kpi-value{color:var(--accent);}.kpi-card.green .kpi-value{color:var(--green);}.kpi-card.yellow .kpi-value{color:var(--yellow);}.kpi-card.red .kpi-value{color:var(--red);}.kpi-sub{font-size:20px;color:var(--muted);}.feedback-grid{display:grid;grid-template-columns:1fr;gap:16px;}@media only screen and (min-width:768px){.feedback-grid{grid-template-columns:repeat(2,1fr);}}@media only screen and (min-width:1200px){.feedback-grid{grid-template-columns:repeat(3,1fr);}}.fb-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}.fb-photo{display:block;width:100%;background:var(--card);border-bottom:1px solid var(--border);text-decoration:none;overflow:hidden;}.fb-photo img{width:100%;display:block;object-fit:contain;background:#000;}.fb-photo-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:6px;}.fb-photo-placeholder span{font-size:22px;color:var(--muted);}.fb-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:8px;}.fb-meta{display:flex;justify-content:space-between;align-items:center;}.fb-store{font-size:26px;font-weight:700;color:var(--accent);}.fb-date{font-size:22px;color:var(--muted);}.fb-content{font-size:26px;line-height:1.6;color:var(--text);}.fb-info{font-size:22px;color:var(--muted);padding:8px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;}.fb-footer{display:flex;justify-content:space-between;align-items:center;}.fb-factory{font-size:22px;color:var(--muted2);}.fb-status{font-size:22px;padding:3px 10px;border-radius:12px;white-space:nowrap;font-weight:600;}.fb-status.repress{background:var(--green);color:white;}.fb-status.in-progress{background:var(--yellow);color:#000;}.fb-status.pending{background:var(--red);color:white;}</style></head><body><div class="app"><header class="topbar"><div><h1>💬 フィードバック報告ダッシュボード</h1><div class="topbar-sub" id="update-time">準備中...</div></div><button class="btn" onclick="location.reload()">🔄 更新</button></header><div class="main" id="main-content"><div class="loading"><span class="loading-icon">📊</span>データ読み込み中...</div></div></div><script>window.onload = function() {  google.script.run    .withSuccessHandler(function(json) {      var data = JSON.parse(json);      if (!data || data.length < 2) {        document.getElementById("main-content").innerHTML = "<div class='loading'>データが見つかりません</div>";        return;      }      var rows = [];      for (var i = 1; i < data.length; i++) {        if (!data[i][0]) break;        var d = new Date(data[i][1]);        rows.push({          reportDate:  (d.getMonth()+1) + "/" + d.getDate(),          factory:     String(data[i][2]),          store:       String(data[i][3]),          item:        String(data[i][5]),          type:        String(data[i][6]),          content:     String(data[i][7]),          fileId:      String(data[i][8]),          cause:       String(data[i][9]),          improvement: String(data[i][10])        });      }      rows.reverse();      var total      = rows.length;      var repress    = rows.filter(function(f){ return f.type.indexOf("再プレス") >= 0; }).length;      var inProgress = rows.filter(function(f){ return f.type.indexOf("確認中") >= 0 || f.type.indexOf("対応中") >= 0; }).length;      var pending    = rows.filter(function(f){ return !f.type || f.type === "undefined"; }).length;      var html =        "<div class='kpi-row'>"        + "<div class='kpi-card blue'><div class='kpi-label'>今月の件数</div><div class='kpi-value'>" + total + "</div><div class='kpi-sub'>件</div></div>"        + "<div class='kpi-card green'><div class='kpi-label'>再プレス完了</div><div class='kpi-value'>" + repress + "</div><div class='kpi-sub'>件</div></div>"        + "<div class='kpi-card yellow'><div class='kpi-label'>対応中</div><div class='kpi-value'>" + inProgress + "</div><div class='kpi-sub'>件</div></div>"        + "<div class='kpi-card red'><div class='kpi-label'>未対応</div><div class='kpi-value'>" + pending + "</div><div class='kpi-sub'>件</div></div>"        + "</div><div class='feedback-grid' id='fg'></div>";      document.getElementById("main-content").innerHTML = html;      var grid = document.getElementById("fg");      rows.forEach(function(fb) {        var status = "pending";        if (fb.type.indexOf("再プレス") >= 0) { status = "repress"; }        else if (fb.type.indexOf("確認中") >= 0 || fb.type.indexOf("対応中") >= 0) { status = "in-progress"; }        var hasPhoto = fb.fileId && fb.fileId.length > 10;        var thumbUrl = hasPhoto ? "https://drive.google.com/thumbnail?id=" + fb.fileId + "&sz=w600" : "";        var driveUrl = hasPhoto ? "https://drive.google.com/file/d/" + fb.fileId + "/view" : "";        var photoHtml = hasPhoto          ? "<a class='fb-photo' href='" + driveUrl + "' target='_blank'><img src='" + thumbUrl + "' alt='写真'></a>"          : "<div class='fb-photo fb-photo-placeholder'><div style='font-size:40px;'>👕</div><span>" + fb.item + "</span></div>";        var card = document.createElement("div");        card.className = "fb-card";        card.innerHTML = photoHtml          + "<div class='fb-body'>"          + "<div class='fb-meta'><div class='fb-store'>🏪 " + fb.store + "</div><div class='fb-date'>" + fb.reportDate + "</div></div>"          + "<div class='fb-content'>" + fb.content + "</div>"          + "<div class='fb-info'><div><strong>原因:</strong> " + fb.cause + "</div><div><strong>改善:</strong> " + fb.improvement + "</div></div>"          + "<div class='fb-footer'><div class='fb-factory'>🏭 " + fb.factory + "</div><span class='fb-status " + status + "'>" + (fb.type && fb.type !== "undefined" ? fb.type : "未対応") + "</span></div>"          + "</div>";        grid.appendChild(card);      });      var now = new Date();      document.getElementById("update-time").textContent = "最終更新: " + now.toLocaleString("ja-JP", {month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});    })    .withFailureHandler(function(err) {      document.getElementById("main-content").innerHTML = "<div class='loading' style='color:red;'>エラー: " + err.message + "</div>";    })    .getFeedbackData();};</script></body></html>
