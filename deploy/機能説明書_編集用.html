<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>機能説明書 ・ みわダッシュボード</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14132e; --ink-soft: #4d4f73; --ink-mute: #8a8db0; --line: #e7e5f2; --line-strong: #d3d0e6;
    --accent: #2a6fdb; --accent-deep: #1c4f9c; --accent-soft: #eaf1fc; --bg: #e9ebf0; --card-2: #f6f7fb;
    --green: #1e8e3e; --green-bg: #e6f4ea; --amber: #b25e00; --amber-bg: #fdf0d8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: "Zen Kaku Gothic New", "Plus Jakarta Sans", system-ui, sans-serif; line-height: 1.6; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  .toolbar { position: sticky; top: 0; z-index: 50; display: flex; justify-content: center; gap: 12px; padding: 12px; background: rgba(255,255,255,.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); }
  .toolbar button { font-family: inherit; font-size: 13px; font-weight: 800; color: #fff; background: var(--accent); border: 0; border-radius: 10px; padding: 9px 18px; cursor: pointer; }
  .toolbar .hint { align-self: center; font-size: 12px; color: var(--ink-mute); }

  .doc { max-width: 820px; margin: 22px auto; }
  .page { background: #fff; border-radius: 4px; box-shadow: 0 6px 26px rgba(20,19,46,.10); padding: 54px 56px; margin: 0 auto 22px; position: relative; overflow: hidden; }

  /* Cover */
  .cover { background: linear-gradient(160deg, #2a6fdb 0%, #1c4f9c 100%); color: #fff; min-height: 1000px; display: flex; flex-direction: column; padding: 70px 60px; }
  .cover-badge { display: inline-flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 700; background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.28); border-radius: 999px; padding: 7px 15px; align-self: flex-start; }
  .cover-logo-emoji { font-size: 17px; }
  .cover-spacer { flex: 1; }
  .cover-title { font-family: "Plus Jakarta Sans", "Zen Kaku Gothic New", sans-serif; font-size: 54px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; margin: 0 0 6px; }
  .cover-sub { font-size: 22px; font-weight: 700; opacity: .96; margin-bottom: 26px; }
  .cover-rule { width: 64px; height: 5px; background: #fff; border-radius: 3px; opacity: .9; margin-bottom: 26px; }
  .cover-meta { font-size: 14.5px; line-height: 2; opacity: .96; }
  .cover-meta b { font-weight: 800; }
  .cover-foot { margin-top: 40px; font-size: 12.5px; opacity: .85; border-top: 1px solid rgba(255,255,255,.25); padding-top: 16px; }

  /* Section headings */
  .h-sec { font-family: "Plus Jakarta Sans", sans-serif; font-size: 13px; font-weight: 800; letter-spacing: .14em; color: var(--accent); text-transform: uppercase; }
  .page-title { font-size: 30px; font-weight: 800; letter-spacing: -0.01em; margin: 4px 0 22px; }

  /* TOC */
  .toc-list { list-style: none; margin: 0; padding: 0; }
  .toc-list li { display: flex; align-items: baseline; gap: 12px; padding: 11px 0; border-bottom: 1px dashed var(--line); }
  .toc-no { font-family: "Plus Jakarta Sans", sans-serif; font-size: 14px; font-weight: 800; color: var(--accent); min-width: 30px; }
  .toc-name { font-size: 15px; font-weight: 700; color: var(--ink); }
  .toc-tag { margin-left: auto; font-size: 10.5px; font-weight: 800; color: var(--ink-mute); border: 1px solid var(--line-strong); border-radius: 999px; padding: 2px 9px; }

  /* Intro */
  .intro-lead { font-size: 15px; color: var(--ink-soft); line-height: 1.9; margin-bottom: 22px; }
  .intro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 22px; }
  .intro-card { background: var(--card-2); border: 1px solid var(--line); border-radius: 14px; padding: 15px 17px; }
  .intro-card h4 { margin: 0 0 5px; font-size: 14px; font-weight: 800; color: var(--accent-deep); }
  .intro-card p { margin: 0; font-size: 12.5px; color: var(--ink-soft); line-height: 1.7; }
  .legend-box { background: var(--accent-soft); border: 1px solid #cfe0f8; border-radius: 12px; padding: 13px 16px; font-size: 12.5px; color: var(--accent-deep); font-weight: 600; }

  /* Feature section */
  .feat-head { display: flex; align-items: center; gap: 14px; border-bottom: 2px solid var(--accent); padding-bottom: 14px; margin-bottom: 18px; }
  .feat-no { font-family: "Plus Jakarta Sans", sans-serif; font-size: 30px; font-weight: 800; color: var(--accent); line-height: 1; min-width: 58px; }
  .feat-titles { flex: 1; }
  .feat-title { font-size: 23px; font-weight: 800; letter-spacing: -0.01em; }
  .feat-tag { font-size: 11px; font-weight: 800; color: #fff; background: var(--accent); border-radius: 999px; padding: 3px 11px; }
  .feat-tag.mgmt { background: #8430ce; }

  .shots { display: flex; gap: 14px; margin-bottom: 18px; align-items: flex-start; }
  .shot-pc { flex: 1; min-width: 0; }
  .shot-pc.solo { flex: 1 1 100%; }
  .shot-m { width: 188px; flex-shrink: 0; }
  .shot-frame { border: 1px solid var(--line-strong); border-radius: 10px; overflow: hidden; background: #fff; box-shadow: 0 2px 10px rgba(20,19,46,.06); }
  .shot-frame img { display: block; width: 100%; height: auto; }
  .shot-cap { font-size: 11px; color: var(--ink-mute); font-weight: 700; margin-top: 6px; text-align: center; }

  .block { margin-bottom: 16px; break-inside: avoid; }
  .block-label { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 800; margin-bottom: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
  .lab-purpose .dot { background: var(--accent); } .lab-purpose { color: var(--accent-deep); }
  .lab-steps .dot { background: var(--green); } .lab-steps { color: var(--green); }
  .lab-tips .dot { background: var(--amber); } .lab-tips { color: var(--amber); }

  .purpose-text { font-size: 13.5px; color: var(--ink-soft); line-height: 1.8; }
  .steps { list-style: none; counter-reset: s; margin: 0; padding: 0; }
  .steps li { counter-increment: s; position: relative; padding: 6px 0 6px 40px; font-size: 13.5px; color: var(--ink); line-height: 1.65; }
  .steps li::before { content: counter(s); position: absolute; left: 0; top: 6px; width: 26px; height: 26px; background: var(--green-bg); color: var(--green); font-family: "Plus Jakarta Sans", sans-serif; font-size: 13px; font-weight: 800; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .tips { list-style: none; margin: 0; padding: 0; background: var(--amber-bg); border-radius: 12px; padding: 12px 16px; }
  .tips li { position: relative; padding: 4px 0 4px 18px; font-size: 12.5px; color: #7a4a08; line-height: 1.65; }
  .tips li::before { content: "・"; position: absolute; left: 2px; color: var(--amber); font-weight: 800; }

  .pg-num { position: absolute; bottom: 22px; right: 32px; font-size: 11px; font-weight: 700; color: var(--ink-faint, #b9bcd6); font-family: "Plus Jakarta Sans", sans-serif; }
  .pg-foot { position: absolute; bottom: 20px; left: 32px; font-size: 10.5px; color: var(--ink-mute); }

  @page { size: A4; margin: 13mm; }
  @media print {
    body { background: #fff; }
    .toolbar { display: none; }
    .doc { max-width: none; margin: 0; }
    .page { box-shadow: none; border-radius: 0; margin: 0; padding: 0; min-height: 0; break-after: page; }
    .page:last-child { break-after: auto; }
    .cover { min-height: 0; height: 251mm; }
    .feat-head, .shots, .block { break-inside: avoid; }
  }
</style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="14" fill="#2a6fdb"/>
      <rect x="30" y="24" width="40" height="52" rx="4" fill="#fff"/>
      <rect x="37" y="34" width="26" height="3.5" rx="1.75" fill="#9bb8e8"/>
      <rect x="37" y="43" width="26" height="3.5" rx="1.75" fill="#9bb8e8"/>
      <rect x="37" y="52" width="18" height="3.5" rx="1.75" fill="#9bb8e8"/>
    </svg>
  </template>
  <div class="toolbar no-print">
    <button onclick="window.print()">🖨 PDFとして保存 / 印刷</button>
    <span class="hint">ボタンを押して「送信先 → PDFに保存」を選ぶとPDFになります</span>
  </div>
  <div class="doc" id="doc"></div>

  <script src="manual-data.js"></script>
  <script>
    const M = window.MANUAL;
    const esc = (s) => String(s);
    const doc = document.getElementById("doc");
    let pageNo = 0;
    const foot = () => `<div class="pg-foot">${M.meta.org} ・ ${M.meta.title} 機能説明書</div><div class="pg-num">${++pageNo}</div>`;

    // ── 表紙 ──
    let html = `
      <div class="page cover">
        <div class="cover-badge"><span class="cover-logo-emoji">🧺</span> ${esc(M.meta.org)}</div>
        <div class="cover-spacer"></div>
        <div class="cover-title">${esc(M.meta.title)}</div>
        <div class="cover-sub">${esc(M.meta.subtitle)}</div>
        <div class="cover-rule"></div>
        <div class="cover-meta">
          全店共有・PC／スマホ対応の社内管理システム<br>
          <b>バージョン</b>　${esc(M.meta.version)}　／　<b>発行</b>　${esc(M.meta.date)}
        </div>
        <div class="cover-spacer"></div>
        <div class="cover-foot">${esc(M.meta.url)}</div>
      </div>`;

    // ── 目次 ──
    html += `
      <div class="page">
        <div class="h-sec">Contents</div>
        <div class="page-title">目次</div>
        <ul class="toc-list">
          ${M.sections.map((s) => `<li><span class="toc-no">${s.no}</span><span class="toc-name">${esc(s.title)}</span><span class="toc-tag">${esc(s.tag)}</span></li>`).join("")}
        </ul>
        ${foot()}
      </div>`;

    // ── はじめに ──
    html += `
      <div class="page">
        <div class="h-sec">Introduction</div>
        <div class="page-title">はじめに</div>
        <div class="intro-lead">${esc(M.intro.lead)}</div>
        <div class="intro-grid">
          ${M.intro.points.map((p) => `<div class="intro-card"><h4>${esc(p[0])}</h4><p>${esc(p[1])}</p></div>`).join("")}
        </div>
        <div class="legend-box">${esc(M.intro.legend)}</div>
        ${foot()}
      </div>`;

    // ── 各機能 ──
    for (const s of M.sections) {
      const hasM = !!s.mShot;
      const shots = `
        <div class="shots">
          <div class="shot-pc ${hasM ? "" : "solo"}">
            <div class="shot-frame"><img src="${s.pcShot}" alt="${esc(s.title)}"></div>
            <div class="shot-cap">${s.id === "mobile" ? "業務メニュー（スマホ）" : "PC版の画面"}</div>
          </div>
          ${hasM ? `<div class="shot-m"><div class="shot-frame"><img src="${s.mShot}" alt="${esc(s.title)} スマホ"></div><div class="shot-cap">スマホ版</div></div>` : ""}
        </div>`;
      html += `
        <div class="page">
          <div class="feat-head">
            <div class="feat-no">${s.no}</div>
            <div class="feat-titles"><div class="feat-title">${esc(s.title)}</div></div>
            <span class="feat-tag ${s.tag === "管理" ? "mgmt" : ""}">${esc(s.tag)}</span>
          </div>
          ${shots}
          <div class="block">
            <div class="block-label lab-purpose"><span class="dot"></span>目的</div>
            <div class="purpose-text">${esc(s.purpose)}</div>
          </div>
          <div class="block">
            <div class="block-label lab-steps"><span class="dot"></span>操作手順</div>
            <ol class="steps">${s.steps.map((t) => `<li>${esc(t)}</li>`).join("")}</ol>
          </div>
          ${s.tips && s.tips.length ? `<div class="block"><div class="block-label lab-tips"><span class="dot"></span>ポイント・注意</div><ul class="tips">${s.tips.map((t) => `<li>${esc(t)}</li>`).join("")}</ul></div>` : ""}
          ${foot()}
        </div>`;
    }

    doc.innerHTML = html;
  </script>
  <script src="polished-fontscale.js"></script>
</body>
</html>
