<body>
<div id="m-root">
  <div id="m-boot">
    <div class="m-boot-logo">🧺</div>
    <div class="m-boot-spin"></div>
    <div class="m-boot-text">読み込んでいます…</div>
    <div id="m-boot-slow" class="m-boot-slow">
      読み込みに時間がかかっています。<br>
      <button onclick="location.reload()">再読み込み</button>
      <a href="index.html?view=pc">PC版を開く</a>
    </div>
  </div>
</div>

<style>
  #m-boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#f4f6fa;font-family:'Zen Kaku Gothic New',system-ui,sans-serif;text-align:center;padding:24px;}
  .m-boot-logo{font-size:46px;}
  .m-boot-spin{width:30px;height:30px;border:3px solid #d7def0;border-top-color:#2a6fdb;border-radius:50%;animation:mBootSpin .8s linear infinite;}
  @keyframes mBootSpin{to{transform:rotate(360deg)}}
  .m-boot-text{font-size:14px;color:#7b8094;font-weight:600;}
  .m-boot-slow{display:none;margin-top:8px;font-size:13px;color:#4d4f73;line-height:1.9;}
  .m-boot-slow.show{display:block;}
  .m-boot-slow button{margin:8px 6px 0;padding:11px 20px;border:0;border-radius:999px;background:#2a6fdb;color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
  .m-boot-slow a{display:inline-block;margin-top:8px;color:#2a6fdb;font-size:13px;font-weight:700;text-decoration:underline;}
</style>

<script>
// 白画面で止まらない保険：一定時間マウントできなければ復帰UIを出す
(function () {
  var mounted = false;
  document.addEventListener("m-app-mounted", function () {
    mounted = true;
    var b = document.getElementById("m-boot");
    if (b && b.parentNode) b.parentNode.removeChild(b);
  });
  // 8秒経ってもマウントしない → 「再読み込み」案内を表示
  setTimeout(function () {
    if (mounted || window.__mAppMounted) return;
    var s = document.getElementById("m-boot-slow");
    if (s) s.classList.add("show");
  }, 8000);
  // スクリプト/Babel 読み込みエラーも復帰UIを出す
  window.addEventListener("error", function (e) {
    if (mounted || window.__mAppMounted) return;
    var tgt = e && e.target;
    var isResource = tgt && (tgt.tagName === "SCRIPT" || tgt.tagName === "LINK");
    if (isResource) { var s = document.getElementById("m-boot-slow"); if (s) s.classList.add("show"); }
  }, true);
})();
</script>
