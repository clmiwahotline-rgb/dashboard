<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="auth-config.js"></script>
<script src="polished-auth.js"></script>
<script src="polished-device.js"></script>
<script src="polished-mobile-footer.js"></script>
<title>業界ニュース ・ みわダッシュボード</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="icon" sizes="32x32" href="favicon-32.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="polished.css">
<style>
  /* ── news-card（お知らせと共通の見た目） ── */
  .news-card-link { text-decoration: none; display: block; }
  .news-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-bottom: none;
    padding: 16px 20px;
    transition: background 0.15s;
    cursor: pointer;
  }
  .news-card-link:first-child .news-card { border-radius: var(--radius-md) var(--radius-md) 0 0; }
  .news-card-link:last-child .news-card { border-bottom: 1px solid var(--line); border-radius: 0 0 var(--radius-md) var(--radius-md); }
  .news-card-link:only-child .news-card { border-radius: var(--radius-md); border-bottom: 1px solid var(--line); }
  .news-card:hover { background: var(--card-2); }
  .news-card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .news-date { font-size: 11.5px; color: var(--ink-mute); font-weight: 600; font-family: ui-monospace, monospace; flex-shrink: 0; }
  .news-cat-badge { font-size: 10.5px; font-weight: 700; padding: 2px 10px; border-radius: 999px; white-space: nowrap; }
  .news-title { font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.5; margin-bottom: 4px; text-wrap: pretty; }
  .news-link-arrow { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--accent-ink); font-weight: 600; margin-top: 4px; }

  .in-source {
    font-size: 11.5px; font-weight: 700; color: var(--ink-soft);
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── エラーバナー ── */
  .in-error {
    background: rgba(239,68,68,0.08); border: 1px solid #fca5a5;
    border-radius: 12px; padding: 10px 14px; font-size: 12px; color: #991b1b;
  }

  /* ── キーワードバー ── */
  .in-kwbar { padding: 16px 18px; }
  .in-kwbar-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .in-kwbar-title { font-size: 13px; font-weight: 800; color: var(--ink); }
  .in-kwbar-hint { font-size: 11px; color: var(--ink-mute); }
  .in-kwlist { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .in-kwchip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px;
    background: var(--card); color: var(--ink-soft);
    font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .in-kwchip:hover { border-color: var(--line-strong); color: var(--ink); }
  .in-kwchip.active {
    background: linear-gradient(135deg, var(--accent), oklch(0.52 0.18 256));
    color: #fff; border-color: transparent; box-shadow: 0 4px 12px var(--accent-glow);
  }
  .in-kwchip-kw:not(.active):hover { border-color: var(--kwc, var(--line-strong)); color: var(--kwc, var(--ink)); }
  .in-kwcount {
    font-size: 10px; font-weight: 800; font-family: ui-monospace, monospace;
    background: var(--card-2); color: var(--ink-mute);
    border-radius: 999px; padding: 1px 6px; min-width: 18px; text-align: center;
  }
  .in-kwchip.active .in-kwcount { background: rgba(255,255,255,0.25); color: #fff; }
  .in-kwx {
    font-size: 15px; line-height: 1; opacity: 0.5; margin-left: 1px;
    width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%; transition: all 0.12s;
  }
  .in-kwx:hover { opacity: 1; background: rgba(239,68,68,0.15); color: #ef4444; }

  .in-kwadd {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px; border: 1px dashed var(--line-strong); border-radius: 999px;
    background: transparent; color: var(--accent-ink);
    font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s;
  }
  .in-kwadd:hover { background: var(--accent-soft); border-style: solid; }
  .in-kwadd svg { width: 14px; height: 14px; }

  /* ── 除外キーワード ── */
  .in-exdiv { height: 1px; background: var(--line); margin: 16px 0 12px; }
  .in-extitle { color: #b91c1c; }
  .in-exempty { font-size: 12px; color: var(--ink-mute); padding: 4px 2px; }
  .in-exchip {
    background: rgba(239,68,68,0.07); border-color: rgba(239,68,68,0.35); color: #b91c1c;
  }
  .in-exchip:hover { border-color: #ef4444; color: #b91c1c; }
  .in-exadd { color: #b91c1c; border-color: rgba(239,68,68,0.4); }
  .in-exadd:hover { background: rgba(239,68,68,0.08); border-style: solid; }

  .in-addbox { display: inline-flex; align-items: center; gap: 4px; }
  .in-addinput {
    width: 150px; padding: 6px 12px; border: 1px solid var(--accent); border-radius: 999px 0 0 999px;
    background: var(--card); color: var(--ink); font-size: 12px; font-family: inherit; outline: none;
  }
  .in-addgo {
    padding: 6px 14px; border: 1px solid var(--accent); border-left: none; border-radius: 0 999px 999px 0;
    background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer;
  }

  /* ── リストヘッダ ── */
  .in-listhead { display: flex; align-items: center; justify-content: space-between; padding: 2px 4px; flex-wrap: wrap; gap: 8px; }
  .in-listcount { font-size: 12.5px; color: var(--ink-soft); font-weight: 600; }
  .in-listcount b { color: var(--ink); font-size: 14px; }
  .in-countsel { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--ink-mute); }
  .in-countbtn {
    padding: 3px 10px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--card); color: var(--ink-soft); font-size: 11.5px; font-weight: 700;
    font-family: ui-monospace, monospace; cursor: pointer; transition: all 0.12s;
  }
  .in-countbtn:hover { border-color: var(--line-strong); }
  .in-countbtn.active { background: var(--accent); color: #fff; border-color: transparent; }

  /* ── 空状態・スケルトン ── */
  .in-empty { padding: 40px; text-align: center; color: var(--ink-mute); font-size: 13px; }
  .in-skel {
    height: 78px; background: linear-gradient(100deg, var(--card) 30%, var(--card-2) 50%, var(--card) 70%);
    background-size: 200% 100%; animation: inshimmer 1.3s ease-in-out infinite;
    border: 1px solid var(--line); border-bottom: none;
  }
  .in-skel:first-child { border-radius: var(--radius-md) var(--radius-md) 0 0; }
  .in-skel:last-child { border-bottom: 1px solid var(--line); border-radius: 0 0 var(--radius-md) var(--radius-md); }
  @keyframes inshimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="polished-atoms.jsx"></script>
<script type="text/babel" src="polished-sidebar.jsx"></script>
<script type="text/babel" src="polished-industry-news.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentPreset": "forest",
  "bgTone": "neutral"
}/*EDITMODE-END*/;

const IN_ACCENTS = {
  forest:  { L: 0.62, C: 0.15, H: 162 },
  sage:    { L: 0.70, C: 0.09, H: 145 },
  mint:    { L: 0.78, C: 0.11, H: 168 },
  emerald: { L: 0.55, C: 0.16, H: 152 },
  olive:   { L: 0.60, C: 0.10, H: 120 },
};
const IN_BG = {
  lavender: { bg: "#ebe7f7", bg2: "#e3def2" },
  cream:    { bg: "#f5f0e6", bg2: "#ede6d6" },
  cool:     { bg: "#e8edf5", bg2: "#dde4f0" },
  mint:     { bg: "#e6f1ec", bg2: "#d8e8e0" },
  neutral:  { bg: "#eeece8", bg2: "#e3e0db" },
};

const Root = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(() => {
    const a = IN_ACCENTS[t.accentPreset] || IN_ACCENTS.forest;
    const r = document.documentElement;
    r.style.setProperty("--accent", "oklch(0.62 0.19 256)");
    r.style.setProperty("--accent-soft", "oklch(0.93 0.05 256)");
    r.style.setProperty("--accent-ink",  "oklch(0.42 0.16 256)");
    r.style.setProperty("--accent-glow", "oklch(0.62 0.19 256 / 0.18)");
    const bg = IN_BG[t.bgTone] || IN_BG.neutral;
    if (document.documentElement.getAttribute("data-theme") !== "dark") {
      r.style.setProperty("--bg", "#f1f3f4");
      r.style.setProperty("--bg-2", "#e8eaed");
    }
  }, [t]);

  return (
    <>
      <IndustryNewsPage />
      <TweaksPanel title="Tweaks">
        <TweakSection label="アクセント">
          <TweakSelect label="グリーン" value={t.accentPreset}
            options={[
              { label: "Forest 深緑",   value: "forest" },
              { label: "Sage 落ち着き",  value: "sage" },
              { label: "Mint 爽やか",    value: "mint" },
              { label: "Emerald 鮮やか", value: "emerald" },
              { label: "Olive 黄味",    value: "olive" },
            ]}
            onChange={(v) => setTweak({ accentPreset: v })}/>
        </TweakSection>
        <TweakSection label="背景">
          <TweakSelect label="ベース色" value={t.bgTone}
            options={[
              { label: "Lavender",  value: "lavender" },
              { label: "Cream",     value: "cream" },
              { label: "Cool",      value: "cool" },
              { label: "Mint",      value: "mint" },
              { label: "Neutral",   value: "neutral" },
            ]}
            onChange={(v) => setTweak({ bgTone: v })}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);
</script>
</body>
</html>
