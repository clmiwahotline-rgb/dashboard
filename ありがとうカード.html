<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="auth-config.js"></script>
<script src="polished-auth.js"></script>
<script src="polished-device.js"></script>
<script src="polished-mobile-footer.js?v=217"></script>
<title>ありがとうカード ・ みわダッシュボード</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="icon" sizes="32x32" href="favicon-32.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="polished.css">
<style>
  /* ── ありがとうカード固有スタイル ─────────────── */
  .ag-card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  @media (max-width: 1100px) { .ag-card-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px)  { .ag-card-grid { grid-template-columns: 1fr; } }

  .ag-card {
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 14px;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .ag-card:hover {
    box-shadow: var(--shadow-lift);
    transform: translateY(-2px);
  }
  .ag-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .ag-store-tag {
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .ag-kind-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .ag-content {
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.7;
    border-left: 3px solid var(--line);
    padding-left: 10px;
    text-wrap: pretty;
  }

  .ag-pill {
    padding: 6px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--card);
    color: var(--ink-soft);
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .ag-pill:hover { border-color: var(--line-strong); color: var(--ink); }
  .ag-pill.active {
    background: linear-gradient(135deg, var(--accent), oklch(0.52 0.18 256));
    color: white;
    border-color: transparent;
    box-shadow: 0 4px 12px var(--accent-glow);
  }

  /* ── 個別カードコメント ───────────────────────── */
  .ag-copy { border: 1px solid var(--line-strong); background: var(--card); color: var(--ink-soft); font-size: 10px; font-weight: 700; font-family: inherit; padding: 3px 8px; border-radius: 6px; cursor: pointer; white-space: nowrap; transition: all .12s; }
  .ag-copy:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .ag-copy.done { border-color: #16a34a; color: #16a34a; background: #dcfce7; }
  .ag-comments { margin-top: 11px; padding-top: 10px; border-top: 1px dashed var(--line-strong); display: flex; flex-direction: column; gap: 7px; }
  .ag-cmt-list { display: flex; flex-direction: column; gap: 5px; }
  .ag-cmt { display: flex; align-items: flex-start; gap: 6px; background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px; }
  .ag-cmt-ico { font-size: 11px; line-height: 1.5; flex-shrink: 0; }
  .ag-cmt-txt { font-size: 11.5px; color: var(--ink-soft); line-height: 1.55; flex: 1; min-width: 0; text-wrap: pretty; }
  .ag-cmt-txt b { color: var(--ink); font-weight: 700; }
  .ag-cmt-del { border: 0; background: transparent; color: var(--ink-faint); font-size: 15px; line-height: 1; cursor: pointer; padding: 0 2px; border-radius: 4px; flex-shrink: 0; }
  .ag-cmt-del:hover { background: #fee2e2; color: #b91c1c; }
  .ag-cmt-form { display: flex; gap: 6px; align-items: center; }
  .ag-cmt-name { width: 86px; flex-shrink: 0; }
  .ag-cmt-input { flex: 1; min-width: 0; }
  .ag-cmt-name, .ag-cmt-input { height: 30px; padding: 0 9px; border-radius: 7px; border: 1px solid var(--line-strong); background: var(--card); color: var(--ink); font-size: 11.5px; font-family: inherit; }
  .ag-cmt-name:focus, .ag-cmt-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .ag-cmt-add { height: 30px; padding: 0 13px; border-radius: 7px; border: 1px solid var(--accent); background: var(--accent); color: #fff; font-size: 11.5px; font-weight: 700; cursor: pointer; font-family: inherit; flex-shrink: 0; }
  .ag-cmt-add:disabled { opacity: .4; cursor: default; }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* PDF print */
  @media print {
    .sidebar, .greet .right, .ag-pill, .ag-cmt-form, .btn { display: none !important; }
    .shell { grid-template-columns: 1fr !important; }
    .main  { padding: 0 !important; }
    .ag-card { break-inside: avoid; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="polished-cloud.jsx"></script>
<script type="text/babel" src="polished-atoms.jsx"></script>
<script type="text/babel" src="polished-sidebar.jsx"></script>
<script type="text/babel" src="polished-arigatou.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentPreset": "emerald",
  "bgTone": "lavender"
}/*EDITMODE-END*/;

const ST_ACCENTS = {
  forest:  { L: 0.62, C: 0.15, H: 162 },
  sage:    { L: 0.70, C: 0.09, H: 145 },
  mint:    { L: 0.78, C: 0.11, H: 168 },
  emerald: { L: 0.55, C: 0.16, H: 152 },
  olive:   { L: 0.60, C: 0.10, H: 120 },
};
const ST_BG = {
  lavender: { bg: "#ebe7f7", bg2: "#e3def2" },
  cream:    { bg: "#f5f0e6", bg2: "#ede6d6" },
  cool:     { bg: "#e8edf5", bg2: "#dde4f0" },
  mint:     { bg: "#e6f1ec", bg2: "#d8e8e0" },
  neutral:  { bg: "#eeece8", bg2: "#e3e0db" },
};

const Root = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(() => {
    const a = ST_ACCENTS[t.accentPreset] || ST_ACCENTS.emerald;
    const r = document.documentElement;
    r.style.setProperty("--accent", "oklch(0.62 0.19 256)");
    r.style.setProperty("--accent-soft", "oklch(0.93 0.05 256)");
    r.style.setProperty("--accent-ink",  "oklch(0.42 0.16 256)");
    r.style.setProperty("--accent-glow", "oklch(0.62 0.19 256 / 0.18)");
    const bg = ST_BG[t.bgTone] || ST_BG.lavender;
    if (document.documentElement.getAttribute("data-theme") !== "dark") {
      r.style.setProperty("--bg", "#f1f3f4");
      r.style.setProperty("--bg-2", "#e8eaed");
    }
  }, [t]);

  return (
    <>
      <ArigatouPage />
      <TweaksPanel title="Tweaks">
        <TweakSection label="アクセント">
          <TweakSelect label="グリーン" value={t.accentPreset}
            options={[
              { label: "Forest 深緑",   value: "forest" },
              { label: "Sage 落ち着き",  value: "sage" },
              { label: "Mint 爽やか",    value: "mint" },
              { label: "Emerald 鮮やか", value: "emerald" },
              { label: "Olive 黄味",    value: "olive" },
            ]}
            onChange={(v) => setTweak({ accentPreset: v })}/>
        </TweakSection>
        <TweakSection label="背景">
          <TweakSelect label="ベース色" value={t.bgTone}
            options={[
              { label: "Lavender",  value: "lavender" },
              { label: "Cream",     value: "cream" },
              { label: "Cool",      value: "cool" },
              { label: "Mint",      value: "mint" },
              { label: "Neutral",   value: "neutral" },
            ]}
            onChange={(v) => setTweak({ bgTone: v })}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);
</script>
  <script src="polished-fontscale.js"></script>
</body>
</html>
