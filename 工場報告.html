<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="auth-config.js"></script>
<script src="polished-auth.js"></script>
<script src="polished-device.js"></script>
<script src="polished-mobile-footer.js?v=217"></script>
<title>工場報告 ・ みわダッシュボード</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="icon" sizes="32x32" href="favicon-32.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="polished.css">
<style>
  /* Factory-specific additions */
  .fc-pill {
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--card);
    color: var(--ink-soft);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .fc-pill:hover { border-color: var(--line-strong); color: var(--ink); }
  .fc-pill.active { border-color: currentColor; color: inherit; }
  .fc-pill-count {
    background: var(--bg-2);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-soft);
  }
  .fc-pill.active .fc-pill-count { background: var(--accent-soft); color: var(--accent-ink); }

  .fc-alert {
    background: rgba(239,68,68,0.08);
    border: 1px solid #fca5a5;
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    color: #991b1b;
  }
  .fc-alert svg { flex-shrink: 0; color: currentColor; }
  .fc-alert-title { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
  .fc-alert-desc { font-size: 11.5px; line-height: 1.5; }
  .fc-alert-desc code { background: var(--bg-2); padding: 2px 6px; border-radius: 4px; font-family: ui-monospace, monospace; }

  .fc-comp {
    padding: 16px 0;
  }
  .fc-comp-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  @media (max-width: 900px) { .fc-comp-grid { grid-template-columns: 1fr; } }

  .fc-comp-col {
    padding: 14px 16px;
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
  }
  .fc-comp-name {
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }
  .fc-comp-total {
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .fc-bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .fc-bar-label {
    width: 70px;
    font-size: 11px;
    color: var(--ink-mute);
    text-align: right;
    flex-shrink: 0;
  }
  .fc-bar-track {
    flex: 1;
    height: 16px;
    background: var(--line);
    border-radius: 3px;
    overflow: hidden;
  }
  .fc-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .fc-bar-val {
    width: 55px;
    font-size: 11px;
    font-weight: 600;
    text-align: right;
    flex-shrink: 0;
    color: var(--ink);
    font-family: ui-monospace, monospace;
  }
  .fc-comp-stats {
    font-size: 11px;
    color: var(--ink-mute);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
  }

  .fc-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .fc-table th {
    padding: 8px 10px;
    text-align: center;
    color: var(--ink-mute);
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
    border-bottom: 1px solid var(--line-strong);
    background: var(--bg-2);
  }
  .fc-table td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }
  .fc-table tbody tr:nth-child(even) { background: var(--bg-2); }
  .fc-table .mono {
    font-family: ui-monospace, monospace;
    font-size: 11px;
  }
  .fc-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
  }
  .row-action {
    padding: 4px 8px;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 6px;
    cursor: pointer;
    color: var(--ink-mute);
    transition: all 0.15s;
    font-family: inherit;
  }
  .row-action:hover { border-color: var(--accent); color: var(--accent-ink); }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="polished-atoms.jsx"></script>
<script type="text/babel" src="polished-sidebar.jsx"></script>
<script type="text/babel" src="polished-factory-atoms.jsx"></script>
<script type="text/babel" src="polished-factory.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentPreset": "emerald",
  "bgTone": "mint"
}/*EDITMODE-END*/;

const ST_ACCENTS = {
  forest:  { L: 0.62, C: 0.15, H: 162 },
  sage:    { L: 0.70, C: 0.09, H: 145 },
  mint:    { L: 0.78, C: 0.11, H: 168 },
  emerald: { L: 0.55, C: 0.16, H: 152 },
  olive:   { L: 0.60, C: 0.10, H: 120 },
};
const ST_BG = {
  lavender: { bg: "#ebe7f7", bg2: "#e3def2" },
  cream:    { bg: "#f5f0e6", bg2: "#ede6d6" },
  cool:     { bg: "#e8edf5", bg2: "#dde4f0" },
  mint:     { bg: "#e6f1ec", bg2: "#d8e8e0" },
  neutral:  { bg: "#eeece8", bg2: "#e3e0db" },
};

const Root = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(() => {
    const a = ST_ACCENTS[t.accentPreset] || ST_ACCENTS.emerald;
    const r = document.documentElement;
    r.style.setProperty("--accent", "oklch(0.62 0.19 256)");
    r.style.setProperty("--accent-soft", "oklch(0.93 0.05 256)");
    r.style.setProperty("--accent-ink",  "oklch(0.42 0.16 256)");
    r.style.setProperty("--accent-glow", "oklch(0.62 0.19 256 / 0.18)");
    const bg = ST_BG[t.bgTone] || ST_BG.mint;
    if (document.documentElement.getAttribute("data-theme") !== "dark") {
      r.style.setProperty("--bg", "#f1f3f4");
      r.style.setProperty("--bg-2", "#e8eaed");
    }
  }, [t]);

  return (
    <>
      <FactoryReportPage />
      <TweaksPanel title="Tweaks">
        <TweakSection label="アクセント">
          <TweakSelect label="グリーン" value={t.accentPreset}
            options={[
              { label: "Forest 深緑",   value: "forest" },
              { label: "Sage 落ち着き",  value: "sage" },
              { label: "Mint 爽やか",    value: "mint" },
              { label: "Emerald 鮮やか", value: "emerald" },
              { label: "Olive 黄味",    value: "olive" },
            ]}
            onChange={(v) => setTweak({ accentPreset: v })}/>
        </TweakSection>
        <TweakSection label="背景">
          <TweakSelect label="ベース色" value={t.bgTone}
            options={[
              { label: "Lavender",  value: "lavender" },
              { label: "Cream",     value: "cream" },
              { label: "Cool",      value: "cool" },
              { label: "Mint",      value: "mint" },
              { label: "Neutral",   value: "neutral" },
            ]}
            onChange={(v) => setTweak({ bgTone: v })}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);
</script>
  <script src="polished-fontscale.js"></script>
</body>
</html>
