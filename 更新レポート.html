<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>更新レポート ・ みわダッシュボード</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="polished.css">
<style>
  body { background: var(--bg); color: var(--ink); font-family: "Zen Kaku Gothic New", "Plus Jakarta Sans", system-ui, sans-serif; margin: 0; }
  .cl-wrap { max-width: 860px; margin: 0 auto; padding: 36px 22px 80px; }
  .cl-top { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; }
  .cl-back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: var(--accent-ink); text-decoration: none; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 7px 14px; }
  .cl-back:hover { border-color: var(--line-strong); }
  .cl-h1 { font-family: "Plus Jakarta Sans", sans-serif; font-size: 30px; font-weight: 800; letter-spacing: -0.02em; margin: 18px 0 4px; }
  .cl-sub { font-size: 13.5px; color: var(--ink-mute); margin-bottom: 30px; }
  .cl-now-badge { font-size: 12px; font-weight: 800; color: #fff; background: var(--accent); border-radius: 999px; padding: 5px 12px; }

  .cl-ver { background: var(--card); border: 1px solid var(--line); border-radius: 20px; box-shadow: var(--shadow-card); padding: 22px 24px; margin-bottom: 18px; }
  .cl-ver-head { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; padding-bottom: 14px; border-bottom: 1px solid var(--line); margin-bottom: 16px; }
  .cl-ver-num { font-family: "Plus Jakarta Sans", sans-serif; font-size: 24px; font-weight: 800; color: var(--ink); letter-spacing: -0.01em; }
  .cl-ver-num .v { color: var(--accent-ink); }
  .cl-ver-date { font-size: 12.5px; font-weight: 700; color: var(--ink-mute); font-variant-numeric: tabular-nums; }
  .cl-ver-tag { margin-left: auto; font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 999px; }
  .cl-ver-tag.base { background: var(--card-2); color: var(--ink-soft); }

  .cl-group { margin-bottom: 14px; }
  .cl-group:last-child { margin-bottom: 0; }
  .cl-group-label { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 800; margin-bottom: 9px; }
  .cl-dot { width: 9px; height: 9px; border-radius: 3px; }
  .cl-new .cl-dot { background: #34A853; } .cl-new .cl-group-label { color: #1e7a3c; }
  .cl-imp .cl-dot { background: #4285F4; } .cl-imp .cl-group-label { color: #2a62c9; }
  .cl-fix .cl-dot { background: #EA4335; } .cl-fix .cl-group-label { color: #c5221f; }

  .cl-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 7px; }
  .cl-list li { position: relative; padding-left: 18px; font-size: 13.5px; line-height: 1.6; color: var(--ink-soft); }
  .cl-list li::before { content: ""; position: absolute; left: 3px; top: 9px; width: 6px; height: 6px; border-radius: 50%; background: var(--line-strong); }
  .cl-list li b { color: var(--ink); font-weight: 700; }

  .cl-ver-url { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: var(--accent-ink); text-decoration: none; background: var(--card-2); border-radius: 999px; padding: 4px 10px; word-break: break-all; }
  .cl-ver-url:hover { text-decoration: underline; }
  .cl-copy { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 800; color: #fff; background: #06C755; border: 0; border-radius: 999px; padding: 7px 14px; cursor: pointer; transition: filter .15s, transform .1s; }
  .cl-copy:hover { filter: brightness(1.05); }
  .cl-copy:active { transform: translateY(1px); }
  .cl-copy.done { background: var(--accent-ink); }

  .cl-empty { font-size: 13px; color: var(--ink-mute); }
  .cl-toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); background: var(--ink); color: #fff; font-size: 13px; font-weight: 700; padding: 11px 20px; border-radius: 999px; box-shadow: var(--shadow-lift); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 100; }
  .cl-toast.show { opacity: 1; }
  @media (max-width: 560px) { .cl-h1 { font-size: 24px; } .cl-ver { padding: 18px 16px; } .cl-ver-head { gap: 10px; } .cl-copy { margin-left: 0; } }
</style>
</head>
<body>
  <div class="cl-wrap">
    <div class="cl-top">
      <a class="cl-back" href="index.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        ダッシュボードへ戻る
      </a>
    </div>
    <h1 class="cl-h1">更新レポート</h1>
    <div class="cl-sub">みわダッシュボード v.2 の変更履歴です。全データを出力するたびにバージョンを更新し、変更点をここに記録します。各版の「LINE用にコピー」で、お知らせ文をそのまま貼り付けられます。</div>
    <div id="cl-root"></div>
  </div>
  <div class="cl-toast" id="cl-toast">コピーしました</div>

  <script>
    // サイトURL（LINE周知・各バージョン表示で使用）
    const SITE_URL = "https://statuesque-beignet-f1be04.netlify.app/";

    // ── バージョン履歴（新しい順）─ 出力ごとに先頭へ追記 ──
    const CHANGELOG = [
      {
        version: "2.08",
        date: "2026-06-07",
        groups: {
          new: [
            "<b>クレーム・事故品をGoogleフォームから取込</b>。発生日・店舗・種別・顧客名・会員番号・メーカー・品目・内容・対応状況・弁償金・担当者・<b>写真</b>まで、フォーム回答をそのまま一覧へ取込（PC・スマホに「フォームから取込」ボタン／5分ごとの自動取込も用意）。",
            "<b>車両管理をGoogleフォームから取込</b>。「車両報告フォーム」の回答を報告種別（<b>給油 / 整備 / 洗車</b>）で自動判定し、給油記録・整備履歴へ振り分け（「フォームから取込」ボタン／自動取込も）。",
            "<b>スマホ版に「アカウント・その他」画面を追加</b>。ログイン中のアカウント情報（名前・メール・権限）、バージョン、報告フォーム、機能説明書、ログアウトをまとめて表示。",
            "<b>スマホ版シフト</b>で店舗バッジ横に<b>セールバッジ</b>、スタッフ名横に<b>ヘルプ・他店応援・研修</b>のタグを表示。",
          ],
          improve: [
            "<b>各ページの初期サンプル（デモ用ダミーデータ）を全廃</b>。全ページ・ダッシュボード各カードを<b>実データのみ</b>表示（無いときは「データなし」）に。フェイクデータが共有クラウドへ書き込まれるのも防止。当月売上カードは実際の売上データから集計。",
            "<b>車両一覧カード</b>を改良：「保険満了」を削除し「空気圧チェック」の右に<b>「洗車」</b>（前回から60日でアラート）を追加。各カードに<b>「直近の報告」</b>と最新走行距離を表示。入力フォームカードは<b>「直近の報告」一覧</b>に変更（最新5件）。整備種別に「洗車」を追加。",
            "クレーム・事故品の登録／編集で、未入力項目があるときは<b>「未入力のまま投稿してよろしいですか？」</b>と確認のうえ投稿できるように（PC・スマホ）。",
            "スマホ版<b>ありがとうカード</b>の絞り込みを、件数0でも<b>全カテゴリ表示</b>に。",
          ],
          fix: [
            "<b>他の端末でログインが白画面／選択画面で止まる</b>件に対応：読み込み失敗時の「再読み込み」案内、<b>「別の方法でサインイン（リダイレクト方式）」</b>を追加。ポップアップやCookie制限のある端末でもログイン可能に。許可アカウントも追加。",
            "<b>フィードバックページ</b>の「スマホ表示」ボタンを削除。",
            "<b>ダッシュボードを開いた時に最新化されない</b>（各ページを開いた後に反映されていた）件を修正。ダッシュボード／スマホホームを開くだけで、クレーム・車両・共有事項・フィードバックに加え<b>ありがとう・シミ抜き</b>も自動取得。表示は<b>キャッシュ（前回読込）で即時</b>、裏で最新へ更新するため読み込み待ちを短縮。",
            "<b>iPhoneで写真（クレーム・共有ボード・請求書）が表示されない</b>不具合を修正。Drive画像の配信方式を、iOS SafariのCookieブロックでも表示できる方式（lh3）に統一。",
          ],
        },
      },
      {
        version: "2.03",
        date: "2026-06-06",
        groups: {
          new: [
            "<b>Googleサインインを導入</b>。全ページでGoogleアカウントのログインを必須にし、許可した社員だけが利用できるように。",
            "<b>「アカウント管理」ページ</b>を追加。管理者が、ログインを許可するアカウントを追加・削除できます。",
            "ログイン画面に<b>「次回からサインインを省略する」</b>チェックを追加（オンにすると手動ログアウトまで自動入室）。",
            "クレームの保存中に<b>「保存中／写真アップロード中（n/m枚）」のインジケータ</b>を表示（PC・スマホ）。",
          ],
          fix: [
            "クレーム一覧が<b>真っ白になって表示されない</b>不具合を修正（クラウドのコメントデータが原因のクラッシュを解消）。",
            "クレームの写真が<b>「端末内保存」のまま共有されない</b>件に対応（共有APIのドライブ＋スプレッドシート権限の付与手順を整備、失敗時は再アップロード可能に）。",
          ],
        },
      },
      {
        version: "2.02",
        date: "2026-06-05",
        groups: {
          new: [
            "スマホ版の<b>共有ボード</b>を、本日分は全件表示・翌日以降は<b>未確認のみ表示</b>に変更（「✓ 確認した」で既読化、消えた投稿は共有ボードページで確認可）。",
            "<b>ダッシュボードを開いた時に自動で最新取得</b>（PC・スマホ）。取得中はぐるぐる（更新インジケータ）を表示。",
            "ダッシュボード上部に<b>「機能説明書」リンクボタン</b>を追加。",
          ],
          improve: [
            "<b>車両管理</b>：オイル交換を「<b>6000km または 7か月</b>」、空気圧チェックを「<b>2か月ごと</b>」で警告するように。法定点検を削除し<b>空気圧チェック</b>を追加。<b>本部</b>車両に対応。スマホ表示のレイアウト崩れを修正。",
            "機能説明書の車両管理ページを新しいアラート基準に合わせて更新。",
          ],
          fix: [
            "スマホのダッシュボードで<b>シミ抜き除去率が常に約100%</b>になっていた不具合を修正（実際の除去率を表示）。",
            "スマホで<b>クレームの新規・編集フォームが画面外に出て表示されない／ボタンが半分しか出ない</b>不具合を修正。",
          ],
        },
      },
      {
        version: "2.01",
        date: "2026-06-05",
        tag: "初版（基準）",
        groups: {
          new: [
            "売上ダッシュボードに<b>「取り込み履歴」</b>を追加。CSVをファイル単位で確認・削除できるように。",
            "シフトページに<b>編集履歴</b>を追加（変更前→変更後を全端末で共有）。",
            "スマホでPC版ページを開いても<b>下部フッターメニュー</b>を表示。",
            "PC版サイドバーに<b>「スマホ版に戻る」</b>ボタンを追加（スマホ閲覧時のみ）。",
            "ダッシュボード上部に<b>「報告フォーム」リンク</b>と<b>バージョン表示</b>を追加。",
            "この<b>更新レポート</b>ページを追加。",
          ],
          improve: [
            "請求書PDFの<b>自動入力精度を改善</b>。取引先・請求日・支払期限まで全PCで取り込み。",
            "シフト月間表で<b>研修バッジ付きの氏名</b>が省略されず読めるよう2段表示に。",
            "クレーム写真のアップロード失敗時に<b>原因を警告表示</b>＋端末内画像からの再アップロードに対応。",
          ],
          fix: [
            "売上CSVで<b>客数・新規客数の前年実績</b>が取り込めなかった不具合を修正（単価の取り込みも改善）。",
            "スマホ業務メニューで<b>下部メニューバーが隠れる</b>不具合を修正。",
            "スマホ版ありがとうカードの<b>コメント枠が画面からはみ出す</b>のを修正。",
            "売上ダッシュボードの<b>ライトクラウド等のリンクがはみ出す</b>のを修正。",
            "不要になった<b>リセットボタン</b>を削除（履歴削除に一本化）。",
          ],
        },
      },
    ];

    const GROUP_META = { new: ["cl-new", "新機能"], improve: ["cl-imp", "改善"], fix: ["cl-fix", "修正"] };
    const stripHtml = (s) => String(s).replace(/<[^>]+>/g, "");

    // LINE周知用のプレーンテキストを組み立て
    const buildLineText = (v) => {
      const lines = [];
      lines.push("【みわダッシュボード 更新のお知らせ】");
      lines.push(`バージョン v${v.version}（${v.date}）`);
      lines.push(v.url || SITE_URL);
      lines.push("");
      const order = [["new", "■ 新機能"], ["improve", "■ 改善"], ["fix", "■ 修正"]];
      for (const [key, label] of order) {
        const items = (v.groups && v.groups[key]) || [];
        if (!items.length) continue;
        lines.push(label);
        items.forEach((t) => lines.push("・" + stripHtml(t)));
        lines.push("");
      }
      lines.push("ご確認よろしくお願いします。");
      return lines.join("\n").trim();
    };

    let toastTimer = null;
    const showToast = (msg) => {
      const t = document.getElementById("cl-toast");
      t.textContent = msg; t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
    };

    const copyLine = async (idx, btn) => {
      const text = buildLineText(CHANGELOG[idx]);
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        const ta = document.createElement("textarea");
        ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.select();
        try { document.execCommand("copy"); } catch (e2) {}
        document.body.removeChild(ta);
      }
      const orig = btn.dataset.label;
      btn.classList.add("done"); btn.querySelector("span").textContent = "コピーしました ✓";
      showToast("LINE用のお知らせ文をコピーしました");
      setTimeout(() => { btn.classList.remove("done"); btn.querySelector("span").textContent = orig; }, 2200);
    };

    const root = document.getElementById("cl-root");
    root.innerHTML = CHANGELOG.map((v, i) => {
      const groups = Object.entries(v.groups || {}).filter(([, items]) => items && items.length).map(([key, items]) => {
        const [cls, label] = GROUP_META[key] || ["", key];
        return `<div class="cl-group ${cls}">
          <div class="cl-group-label"><span class="cl-dot"></span>${label}</div>
          <ul class="cl-list">${items.map((t) => `<li>${t}</li>`).join("")}</ul>
        </div>`;
      }).join("");
      const tag = v.tag ? `<span class="cl-ver-tag ${i === CHANGELOG.length - 1 ? "base" : ""}">${v.tag}</span>` : "";
      const url = v.url || SITE_URL;
      return `<div class="cl-ver">
        <div class="cl-ver-head">
          <span class="cl-ver-num"><span class="v">v${v.version}</span></span>
          <span class="cl-ver-date">${v.date}</span>
          <a class="cl-ver-url" href="${url}" target="_blank" rel="noopener">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>
            ${url}
          </a>
          <button class="cl-copy" data-label="LINE用にコピー" onclick="copyLine(${i}, this)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
            <span>LINE用にコピー</span>
          </button>
          ${tag}
        </div>
        ${groups || '<div class="cl-empty">変更点の記録はありません。</div>'}
      </div>`;
    }).join("");
  </script>
  <script src="polished-fontscale.js"></script>
</body>
</html>
