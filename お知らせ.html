<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="auth-config.js"></script>
<script src="polished-auth.js"></script>
<script src="polished-device.js"></script>
<script src="polished-mobile-footer.js"></script>
<title>お知らせ ・ みわダッシュボード</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="icon" sizes="32x32" href="favicon-32.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="polished.css">
<style>
  .news-card-link {
    text-decoration: none;
    display: block;
  }
  .news-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-bottom: none;
    padding: 16px 20px;
    transition: background 0.15s;
    cursor: pointer;
  }
  .news-card-link:first-child .news-card {
    border-radius: var(--radius-md) var(--radius-md) 0 0;
  }
  .news-card-link:last-child .news-card {
    border-bottom: 1px solid var(--line);
    border-radius: 0 0 var(--radius-md) var(--radius-md);
  }
  .news-card-link:only-child .news-card {
    border-radius: var(--radius-md);
    border-bottom: 1px solid var(--line);
  }
  .news-card:hover {
    background: var(--card-2);
  }
  .news-card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .news-date {
    font-size: 11.5px;
    color: var(--ink-mute);
    font-weight: 600;
    font-family: ui-monospace, monospace;
    flex-shrink: 0;
  }
  .news-cat-badge {
    font-size: 10.5px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .news-new-badge {
    font-size: 9.5px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 999px;
    background: #ef4444;
    color: white;
    letter-spacing: 0.04em;
  }
  .news-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 4px;
    text-wrap: pretty;
  }
  .news-excerpt {
    font-size: 12px;
    color: var(--ink-mute);
    line-height: 1.65;
    text-wrap: pretty;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .news-link-arrow {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--accent-ink);
    font-weight: 600;
    margin-top: 4px;
  }

  /* ag-pill は polished-arigatou.jsx で定義済みだが、ここでも再定義しておく */
  .ag-pill {
    padding: 6px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--card);
    color: var(--ink-soft);
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .ag-pill:hover { border-color: var(--line-strong); color: var(--ink); }
  .ag-pill.active {
    background: linear-gradient(135deg, var(--accent), oklch(0.52 0.18 256));
    color: white;
    border-color: transparent;
    box-shadow: 0 4px 12px var(--accent-glow);
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="polished-atoms.jsx"></script>
<script type="text/babel" src="polished-sidebar.jsx"></script>
<script type="text/babel" src="polished-news.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentPreset": "emerald",
  "bgTone": "cool"
}/*EDITMODE-END*/;

const ST_ACCENTS = {
  forest:  { L: 0.62, C: 0.15, H: 162 },
  sage:    { L: 0.70, C: 0.09, H: 145 },
  mint:    { L: 0.78, C: 0.11, H: 168 },
  emerald: { L: 0.55, C: 0.16, H: 152 },
  olive:   { L: 0.60, C: 0.10, H: 120 },
};
const ST_BG = {
  lavender: { bg: "#ebe7f7", bg2: "#e3def2" },
  cream:    { bg: "#f5f0e6", bg2: "#ede6d6" },
  cool:     { bg: "#e8edf5", bg2: "#dde4f0" },
  mint:     { bg: "#e6f1ec", bg2: "#d8e8e0" },
  neutral:  { bg: "#eeece8", bg2: "#e3e0db" },
};

const Root = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(() => {
    const a = ST_ACCENTS[t.accentPreset] || ST_ACCENTS.emerald;
    const r = document.documentElement;
    r.style.setProperty("--accent", "oklch(0.62 0.19 256)");
    r.style.setProperty("--accent-soft", "oklch(0.93 0.05 256)");
    r.style.setProperty("--accent-ink",  "oklch(0.42 0.16 256)");
    r.style.setProperty("--accent-glow", "oklch(0.62 0.19 256 / 0.18)");
    const bg = ST_BG[t.bgTone] || ST_BG.cool;
    if (document.documentElement.getAttribute("data-theme") !== "dark") {
      r.style.setProperty("--bg", "#f1f3f4");
      r.style.setProperty("--bg-2", "#e8eaed");
    }
  }, [t]);

  return (
    <>
      <NewsPage />
      <TweaksPanel title="Tweaks">
        <TweakSection label="アクセント">
          <TweakSelect label="グリーン" value={t.accentPreset}
            options={[
              { label: "Forest 深緑",   value: "forest" },
              { label: "Sage 落ち着き",  value: "sage" },
              { label: "Mint 爽やか",    value: "mint" },
              { label: "Emerald 鮮やか", value: "emerald" },
              { label: "Olive 黄味",    value: "olive" },
            ]}
            onChange={(v) => setTweak({ accentPreset: v })}/>
        </TweakSection>
        <TweakSection label="背景">
          <TweakSelect label="ベース色" value={t.bgTone}
            options={[
              { label: "Lavender",  value: "lavender" },
              { label: "Cream",     value: "cream" },
              { label: "Cool",      value: "cool" },
              { label: "Mint",      value: "mint" },
              { label: "Neutral",   value: "neutral" },
            ]}
            onChange={(v) => setTweak({ bgTone: v })}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root />);
</script>
  <script src="polished-fontscale.js"></script>
</body>
</html>
